# API 服务提供商列表。
# 可在 WebUI 的“AI模型厂商配置”中添加 OpenAI 兼容、Gemini 或其他支持的服务。
api_providers = []

# 模型列表。
# 可在 WebUI 的“模型管理与分配”中添加模型，并分配到下方任务配置。
models = []

[inner]
version = "1.12.0"

# 配置文件版本号迭代规则同 bot_config.toml。
# 首次启动时不再预设任何模型厂商或模型，请在 WebUI 中按需添加。

[model_task_config.utils]
model_list = []
temperature = 0.2
max_tokens = 4096
slow_threshold = 15.0
selection_strategy = "random"

[model_task_config.tool_use]
model_list = []
temperature = 0.7
max_tokens = 1024
slow_threshold = 10.0
selection_strategy = "random"

[model_task_config.replyer]
