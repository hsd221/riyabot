name: riyabot

services:
  adapters:
    container_name: riyabot-adapters
    #### prod ####
    image: unclas/maimbot-adapter:latest
    # image: infinitycat/maimbot-adapter:latest
    #### dev ####
    # image: unclas/maimbot-adapter:dev
    # image: infinitycat/maimbot-adapter:dev
    environment:
      - TZ=Asia/Shanghai
#    ports:
#      - "8095:8095"
    volumes:
      - ./docker-config/adapters/config.toml:/adapters/config.toml # 持久化adapters配置文件
      - ./data/adapters:/adapters/data # adapters 数据持久化
    restart: always
    networks:
      - riyabot_net
  core:
    container_name: riyabot-core
    build:
      context: .
      dockerfile: Dockerfile
    image: riyabot:latest
    environment:
      - TZ=Asia/Shanghai
#      - EULA_AGREE=1b662741904d7155d1ce1c00b3530d0d # 同意EULA
#      - PRIVACY_AGREE=9943b855e72199d0f5016ea39052f1b6 # 同意EULA
    ports:
      - "18001:8001" # webui端口
#      - "8000:8000"
    volumes:
      - ./docker-config/mmc/.env:/RiyaBot/.env # 持久化env配置文件
      - ./docker-config/mmc:/RiyaBot/config # 持久化bot配置文件
      - ./docker-config/adapters:/RiyaBot/adapters-config # adapter配置文件夹映射
      - ./data/RiyaBot/riyabot_statistics.html:/RiyaBot/riyabot_statistics.html #统计数据输出
      - ./data/RiyaBot:/RiyaBot/data # 共享目录
      - ./data/RiyaBot/plugins:/RiyaBot/plugins # 插件目录
      - ./data/RiyaBot/logs:/RiyaBot/logs # 日志目录
      # - site-packages:/usr/local/lib/python3.13/site-packages # 持久化Python包，需要时启用
    restart: always
    networks:
      - riyabot_net
  napcat:
    environment:
      - NAPCAT_UID=1000
      - NAPCAT_GID=1000
      - TZ=Asia/Shanghai
    ports:
      - "6099:6099"
    volumes:
      - ./docker-config/napcat:/app/napcat/config # 持久化napcat配置文件
      - ./data/qq:/app/.config/QQ # 持久化QQ本体
      - ./data/RiyaBot:/RiyaBot/data # 共享目录
    container_name: riyabot-napcat
    restart: always
    image: mlikiowa/napcat-docker:latest
    networks:
      - riyabot_net
  sqlite-web:
    # 注意：coleifer/sqlite-web 镜像不支持arm64
    image: coleifer/sqlite-web
    container_name: sqlite-web
    restart: always
    ports:
      - "8120:8080"
    volumes:
      - ./data/RiyaBot:/data/RiyaBot
    environment:
      - SQLITE_DATABASE=RiyaBot/RiyaBot.db  # 你的数据库文件
    networks:
      - riyabot_net

  # chat2db占用相对较高但是功能强大
  # 内存占用约600m，内存充足推荐选此
  # chat2db:
  #   image: chat2db/chat2db:latest
  #   container_name: riyabot-chat2db
  #   restart: always
  #   ports:
  #     - "10824:10824"
  #   volumes:
  #     - ./data/RiyaBot:/data/RiyaBot
  #   networks:
  #     - riyabot_net
  
# volumes:         #  若需要持久化Python包时启用
#   site-packages:
networks:
  riyabot_net:
    driver: bridge
