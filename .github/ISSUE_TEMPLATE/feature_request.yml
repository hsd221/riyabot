name: Feature Request
description: 提出 RiyaBot 的功能建议
labels: ["enhancement"]
body:
- type: checkboxes
  attributes:
    label: "检查项"
    description: "提交前请先确认这些信息。"
    options:
    - label: "我已经搜索过现有 Issues，未找到相同或高度相似的建议"
      required: true
    - label: "这个建议描述的是具体使用场景，而不只是一个技术名词"
- type: textarea
  attributes:
    label: "使用场景"
    description: "你希望 RiyaBot 在什么情况下做什么？现在的痛点是什么？"
  validations:
    required: true
- type: textarea
  attributes:
    label: "期望行为"
    description: "描述你认为合适的交互、配置或 API 形态。"
  validations:
    required: true
- type: textarea
  attributes:
    label: "替代方案"
    description: "你是否尝试过用现有配置、Prompt、插件或脚本解决？"
- type: textarea
  attributes:
    label: "补充信息"
